[credentials]
token = netbox_api-v1_token
url  = https://netbox_url/

[scan_options]
enable_dns = true
enable_scantime = true
scan_interval_hours = 4
scheduler_sleep_seconds = 300
scan_max_workers = 5
nmap_results_keep_last = 4

[logging]
log_dir = logs
backup_count = 14
root_level = DEBUG
file_level = INFO
console_level = INFO
